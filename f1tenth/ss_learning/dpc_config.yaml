map: "Spielberg"
planner:
  dt: 0.05
  N: 100
  reference_speed: 10.0
train_params:
  n_samples: 500000
  num_epochs: 100
  steps_per_epoch: 300
  batch_size: 64
  lr: 1e-3
  weight_decay: 1e-5
  grad_clip: 3.0
  log_every: 50
  save_path: "dpc_constrained_policy.pt"
  save_every: 1

  plateau_factor: 0.5
  plateau_patience: 3
  plateau_min_lr: 1e-6
  plateau_threshold: 1e-4
  plateau_cooldown: 0

  eval_batch_size: 64
  early_stop_patience: 10
  early_stop_min_delta: 1e-4
  penalty_increase_factor: 1.05
