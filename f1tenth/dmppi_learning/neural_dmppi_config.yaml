map: "Spielberg"
planner:
  dt: 0.05
  N: 100
  n_samples: 1024
  n_iterations: 1
  m_samples: 64 # fewer mppi samples 
  updater_n_candidates: 64
  reference_speed: 10.0
train_params:
  n_samples: 1000000
  num_epochs: 100
  steps_per_epoch: 200
  batch_size: 16
  lr: 1e-5
  weight_decay: 1e-5
  grad_clip: 3.0
  log_every: 50
  save_path: "neural_dmppi_constrained_policy.pt"
  save_every: 1

  plateau_factor: 0.5
  plateau_patience: 3
  plateau_min_lr: 1e-6
  plateau_threshold: 1e-4
  plateau_cooldown: 0

  eval_batch_size: 16
  early_stop_patience: 10
  early_stop_min_delta: 1e-4
  penalty_increase_factor: 1.1

  constraint_weight: 5e2
  exploration_weight: 1e-1
  supervised_weight: 1e0
